services:
  - type: web
    name: crypto-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.server:socket_app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_HOST
        value: 0.0.0.0
      - key: SECRET_KEY
        generateValue: true
